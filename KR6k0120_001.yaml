body:
  text: 西天譯經三藏朝散大夫試鴻臚卿傳梵大師賜紫沙門臣法護等奉詔譯歸命一切佛惟願一切佛菩薩衆攝受於我即説伽陀頌曰我今歸命勝菩提最上清淨佛法衆我發廣大菩提心自他利益皆成就懺除一切不善業隨喜無邊衆福蘊先當不食一日中後修八衆長養法當知八種長養法者所謂八戒弟子應於阿闍梨前二三重復説是伽陀已次復當稱己之名字我名某甲惟願阿闍梨攝受於我我從今時發淨信心乃至坐菩提場成等正覺誓歸依佛二足勝尊誓歸依法離欲勝尊誓歸依僧調伏勝尊如是三寶是所歸趣我某甲淨信優婆塞惟願阿闍梨憶持護念我從今日今時發起淨心乃至過是夜分訖於明旦日初出時於其中間奉持八戒所謂一不殺生二不偷盜三不非梵行四不妄語五不飲酒六不非時食七不花鬘莊嚴其身及歌舞戲等八不坐臥高廣大床我今捨離如是等事誓願不捨清淨禁戒八種功德二三重復作如是説又言我持戒行莊嚴其心令心喜悅廣修一切相應勝行求成佛果究竟圓滿又説伽陀曰我發無二最上心為諸衆生不請友勝菩提行善所行成佛世間廣利益願我乘是善業故此世不久成正覺説法饒益於世間解説衆生三有苦
